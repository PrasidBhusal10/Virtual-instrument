<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Melody Studio | Virtual Instruments By Prasid</title>
    <link rel="stylesheet" href="instrument.css">
    


  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
   
</head>
<body>

<div class="instrument-dashboard">
  <div class="header">
    <h1><i class="fas fa-music"></i> INSTRUMENT<i class="fas fa-dharmachakra"></i></h1>
    <div class="subtitle">✨ DESIGN BY PRASID BHUSAL✨</div>
  </div>

  <div class="inst-selector">
    <button data-instr="harmonium" class="inst-btn active"><i class="fas fa-drumstick-bite"></i> Harmonium</button>
    <button data-instr="piano" class="inst-btn"><i class="fas fa-piano"></i> Grand Piano</button>
    <button data-instr="organ" class="inst-btn"><i class="fas fa-church"></i> Pipe Organ</button>
    <button data-instr="marimba" class="inst-btn"><i class="fas fa-tree"></i> Marimba</button>
  </div>

  <div class="keyword-panel" id="keywordPanel"></div>

  <div class="volume-control">
    <i class="fas fa-volume-down"></i>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.75">
    <i class="fas fa-volume-up"></i>
    <span id="volumeValue">75%</span>
  </div>

  <div class="keyboard-container" id="keyboardContainer"></div>

  
</div>
<div class="key-hint" id="keyHint">
  <i class="fas fa-play"></i> Ready to play
</div>
<footer>🎵 Professional sound synthesis with realistic harmonics & natural decay 🎵</footer>

<script src="instrument.js"></script>
</body>
</html>
